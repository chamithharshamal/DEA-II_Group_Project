server.port=8082

# ---- Eureka Client ----
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

# ---- Supabase Configuration (Session Pooler) ----
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres?prepareThreshold=0}
